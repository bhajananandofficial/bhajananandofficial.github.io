<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Cloud MP3 Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modern Glassmorphism Styling */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .playlist-container::-webkit-scrollbar {
            width: 8px;
        }
        .playlist-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        .playlist-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 8px;
        }
        .playlist-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Custom Audio Player Styling */
        audio {
            width: 100%;
            height: 40px;
            border-radius: 12px;
            outline: none;
        }
        audio::-webkit-media-controls-panel {
            background-color: rgba(255, 255, 255, 0.9);
        }

        .track-item {
            transition: all 0.2s ease-in-out;
        }
        .track-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(4px);
        }
        .track-item.active {
            background: rgba(255, 255, 255, 0.9);
            color: #4c51bf;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .track-item.active .text-gray-200 {
            color: #4c51bf;
        }
        .track-item.active .icon-color {
            stroke: #4c51bf;
        }

        /* Star Button Animation */
        .star-btn { transition: transform 0.2s; }
        .star-btn:active { transform: scale(0.8); }
        .star-active { color: #fbbf24 !important; fill: #fbbf24; }
        
        /* Spinner Animation */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-8">

    <div class="glass-panel w-full max-w-2xl rounded-3xl p-6 sm:p-8 flex flex-col gap-6 text-white relative overflow-hidden">
        
        <!-- Decorative background elements -->
        <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-white opacity-10 rounded-full blur-2xl"></div>
        <div class="absolute bottom-[-50px] left-[-50px] w-40 h-40 bg-purple-400 opacity-20 rounded-full blur-2xl"></div>

        <!-- Header -->
        <div class="text-center relative z-10">
            <h1 class="text-3xl font-bold tracking-tight mb-2">My Cloud Drive</h1>
            <p class="text-white/70 text-sm font-medium">Stream & Download your MP3s</p>
        </div>

        <!-- API Key Warning Banner (Hidden by default) -->
        <div id="apiWarning" class="hidden text-center text-amber-200 bg-amber-500/20 p-3 rounded-xl border border-amber-500/30 text-xs relative z-10">
            <strong>Missing Google Drive API Key</strong><br/>
            Playback may be blocked by Google. To fix this permanently, please generate an API key and add it to the code.
        </div>

        <!-- Player Section -->
        <div class="bg-black/20 rounded-2xl p-4 backdrop-blur-md relative z-10 border border-white/10">
            <div id="nowPlayingContainer" class="flex flex-col items-center justify-center mb-3 min-h-[50px]">
                <p class="text-xs text-white/50 uppercase tracking-widest font-semibold mb-1">Now Playing</p>
                <p id="nowPlayingText" class="text-lg font-medium text-center line-clamp-1">Select a track to start listening</p>
            </div>
            
            <!-- Controls: Prev, Audio Native, Next -->
            <div class="flex items-center gap-3 w-full">
                <button onclick="playPrev()" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors text-white shrink-0" title="Previous Track">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                
                <audio id="audioPlayer" controls class="shadow-lg grow">
                    Your browser does not support the audio element.
                </audio>
                
                <button onclick="playNext()" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors text-white shrink-0" title="Next Track">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        </div>

        <!-- Playlist Section -->
        <div class="relative z-10 flex flex-col flex-grow">
            <!-- Filter Tabs -->
            <div class="flex justify-between items-center mb-4 px-2 border-b border-white/10 pb-2">
                <div class="flex gap-4">
                    <button id="tabAll" onclick="switchTab('all')" class="text-lg font-semibold border-b-2 border-white pb-1">All Tracks</button>
                    <button id="tabFav" onclick="switchTab('fav')" class="text-lg font-semibold text-white/50 border-b-2 border-transparent pb-1 hover:text-white transition">Favorites</button>
                </div>
                <span id="trackCount" class="text-xs font-medium bg-white/20 py-1 px-3 rounded-full">0 Tracks</span>
            </div>

            <!-- Loader -->
            <div id="loader" class="flex flex-col items-center justify-center py-12 text-white/80">
                <svg class="spinner w-8 h-8 mb-4 opacity-75" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-sm font-medium">Syncing with Google Drive...</p>
            </div>

            <!-- Playlist -->
            <ul id="playlist" class="playlist-container flex flex-col gap-2 max-h-[350px] overflow-y-auto pr-2 pb-2 hidden">
                <!-- Tracks injected via JS -->
            </ul>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. SET YOUR GOOGLE APPS SCRIPT URL HERE (Fetches the list of files)
        // ==========================================
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbxy--vLuuJuB_8Aoe6ttQB4WH67tNXXQ8bouYUYlD5yPAYNm04iwbS3EBlqBDIJIIygCw/exec';

        // ==========================================
        // 2. SET YOUR GOOGLE DRIVE API KEY HERE (Streams the audio without getting blocked)
        // ==========================================
        const GOOGLE_API_KEY = 'AIzaSyDcCuusfmXgaqL-MgEyzTTsSSn5_XvfYTc'; // Replace with your actual API key

        // Mock data for preview purposes
        const mockData = [
            { name: "Cinematic Ambient Track", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { name: "Upbeat Electronic Dance", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
            { name: "Relaxing Piano Melody", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
            { name: "Acoustic Guitar Session", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" }
        ];

        // App State
        let allTracks = [];
        let currentDisplayTracks = [];
        let currentTrackIndex = -1;
        let currentMode = 'all'; 
        let favorites = JSON.parse(localStorage.getItem('cloudPlayerFavs') || '[]');

        // DOM Elements
        const playlistEl = document.getElementById('playlist');
        const audioPlayer = document.getElementById('audioPlayer');
        const nowPlayingText = document.getElementById('nowPlayingText');
        const loader = document.getElementById('loader');
        const trackCount = document.getElementById('trackCount');
        const tabAll = document.getElementById('tabAll');
        const tabFav = document.getElementById('tabFav');
        const apiWarning = document.getElementById('apiWarning');

        // Check if API Key is missing and show warning
        if (GOOGLE_API_KEY === 'YOUR_API_KEY_HERE' || GOOGLE_API_KEY.trim() === '') {
            apiWarning.classList.remove('hidden');
        }

        // Initialization
        async function loadTracks() {
            try {
                const response = await fetch(webAppUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                let data = await response.json();
                processData(data);
            } catch (error) {
                console.error('Failed to load tracks:', error);
                processData(mockData); 

                const errorBanner = document.createElement('div');
                errorBanner.className = "text-center text-amber-200 bg-amber-500/20 p-3 rounded-xl border border-amber-500/30 mb-3 mx-2 flex-shrink-0";
                errorBanner.innerHTML = `<p class="text-xs">Google blocked access. Showing Demo Tracks.</p>`;
                playlistEl.insertBefore(errorBanner, playlistEl.firstChild);
            }
        }

        function processData(data) {
            // Sort Alphabetically (A-Z) by name
            data.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            
            allTracks = data;
            switchTab('all'); 
        }

        // Switch between All Tracks and Favorites
        function switchTab(mode) {
            currentMode = mode;
            if (mode === 'all') {
                tabAll.classList.replace('text-white/50', 'text-white');
                tabAll.classList.replace('border-transparent', 'border-white');
                tabFav.classList.replace('text-white', 'text-white/50');
                tabFav.classList.replace('border-white', 'border-transparent');
                currentDisplayTracks = allTracks;
            } else {
                tabFav.classList.replace('text-white/50', 'text-white');
                tabFav.classList.replace('border-transparent', 'border-white');
                tabAll.classList.replace('text-white', 'text-white/50');
                tabAll.classList.replace('border-white', 'border-transparent');
                
                currentDisplayTracks = allTracks.filter(t => favorites.includes(getTrackId(t.url)));
            }
            renderPlaylist(currentDisplayTracks);
        }

        // Helper to extract a unique ID from the Google Drive URL
        function getTrackId(url) {
            if(url.includes('id=')) return url.split('id=')[1].split('&')[0];
            return url; 
        }

        // Toggle Favorite status
        function toggleFavorite(e, trackUrl) {
            e.stopPropagation(); 
            const trackId = getTrackId(trackUrl);
            const index = favorites.indexOf(trackId);
            
            if (index > -1) {
                favorites.splice(index, 1); 
            } else {
                favorites.push(trackId); 
            }
            
            localStorage.setItem('cloudPlayerFavs', JSON.stringify(favorites));
            renderPlaylist(currentDisplayTracks);
        }

        // Render the tracks into the UI
        function renderPlaylist(tracks) {
            loader.classList.add('hidden');
            playlistEl.classList.remove('hidden');
            trackCount.textContent = `${tracks.length} Track${tracks.length !== 1 ? 's' : ''}`;

            if (tracks.length === 0) {
                playlistEl.innerHTML = `
                    <div class="text-center py-8 text-white/50">
                        <p>${currentMode === 'fav' ? 'No favorites yet. Star some tracks!' : 'No audio files found.'}</p>
                    </div>`;
                return;
            }

            const errorBanner = playlistEl.querySelector('.bg-amber-500\\/20');
            playlistEl.innerHTML = ''; 
            if(errorBanner) playlistEl.appendChild(errorBanner);

            tracks.forEach((track, index) => {
                const trackId = getTrackId(track.url);
                const isFav = favorites.includes(trackId);
                const isCurrentlyPlaying = (currentTrackIndex === index);

                const li = document.createElement('li');
                li.className = `track-item flex items-center justify-between p-3 bg-white/10 rounded-xl cursor-pointer border border-white/5 group ${isCurrentlyPlaying ? 'active' : ''}`;
                li.onclick = () => playTrack(index);
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'flex items-center gap-3 flex-grow overflow-hidden';

                const iconSVG = `
                    <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center shrink-0 group-hover:bg-white/20 transition-colors">
                        <svg class="w-4 h-4 ml-1 icon-color ${isCurrentlyPlaying ? 'text-[#4c51bf]' : 'text-gray-200'}" fill="currentColor" viewBox="0 0 24 24">
                            ${isCurrentlyPlaying ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>' : '<path d="M8 5v14l11-7z"/>'}
                        </svg>
                    </div>
                `;
                
                const titleP = document.createElement('p');
                titleP.className = `font-medium truncate pr-4 ${isCurrentlyPlaying ? 'text-[#4c51bf]' : 'text-gray-100'}`;
                titleP.textContent = track.name;

                infoDiv.innerHTML = iconSVG;
                infoDiv.appendChild(titleP);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'flex items-center gap-2 flex-shrink-0';

                const starBtn = document.createElement('button');
                starBtn.className = `star-btn p-2 rounded-full transition-colors text-white/50 hover:text-white ${isFav ? 'star-active' : ''}`;
                starBtn.onclick = (e) => toggleFavorite(e, track.url);
                starBtn.innerHTML = `
                    <svg class="w-5 h-5" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                `;

                const downloadBtn = document.createElement('a');
                downloadBtn.href = track.url;
                downloadBtn.download = track.name + '.mp3';
                downloadBtn.target = '_blank';
                downloadBtn.className = 'p-2 rounded-full bg-white/5 hover:bg-white/20 transition-colors text-white';
                downloadBtn.onclick = (e) => e.stopPropagation();
                downloadBtn.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                `;

                actionsDiv.appendChild(starBtn);
                actionsDiv.appendChild(downloadBtn);

                li.appendChild(infoDiv);
                li.appendChild(actionsDiv);
                playlistEl.appendChild(li);
            });
        }

        // Play a specific track by its index in the current list
        function playTrack(index) {
            if(index < 0 || index >= currentDisplayTracks.length) return;
            
            currentTrackIndex = index;
            const track = currentDisplayTracks[index];

            // Extract the Drive file ID
            const trackId = getTrackId(track.url);
            let streamUrl = track.url;

            // =========================================================
            // API IMPLEMENTATION: Play using the official Google Drive API
            // =========================================================
            if(streamUrl.includes('drive.google.com') && GOOGLE_API_KEY !== 'YOUR_API_KEY_HERE' && GOOGLE_API_KEY.trim() !== '') {
                // This is the official Google REST API for streaming media
                streamUrl = `https://www.googleapis.com/drive/v3/files/${trackId}?alt=media&key=${GOOGLE_API_KEY}`;
            } else if(streamUrl.includes('drive.google.com')) {
                // Fallback to the old, blocked way if no API key is provided
                streamUrl = `https://drive.google.com/uc?export=download&id=${trackId}`;
            }

            // Set src directly to allow browser content negotiation
            audioPlayer.src = streamUrl;
            
            // Update UI text and highlight active track before playing
            nowPlayingText.textContent = track.name;
            renderPlaylist(currentDisplayTracks);
            
            // Play with proper promise handling
            const playPromise = audioPlayer.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => {
                    if (e.name === 'AbortError') {
                        console.warn("Playback interrupted by new selection.");
                    } else {
                        console.error("Audio playback failed.", e);
                        nowPlayingText.innerHTML = `<span class="text-red-300 text-sm">Streaming Failed. Click download to play.</span>`;
                    }
                });
            }
        }

        // Previous Track Button
        function playPrev() {
            if (currentTrackIndex > 0) {
                playTrack(currentTrackIndex - 1);
            }
        }

        // Next Track Button
        function playNext() {
            if (currentTrackIndex < currentDisplayTracks.length - 1) {
                playTrack(currentTrackIndex + 1);
            } else {
                playTrack(0); 
            }
        }

        // Auto-play next track when one finishes
        audioPlayer.addEventListener('ended', playNext);

        // Start loading on page load
        window.addEventListener('DOMContentLoaded', loadTracks);

    </script>
</body>
</html>
